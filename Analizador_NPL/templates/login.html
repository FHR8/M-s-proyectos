{% extends 'base.html' %}
<!--Nuevamente usamos la plantilla base-->
{% block content %}
<!--Damos un mensaje de bienvenida y pedimos las credenciales -->
<div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-200">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-blue-900">Bienvenido de nuevo</h2>
        <p class="text-gray-500 text-sm mt-2">Introduce tus credenciales para acceder</p>
    </div>
    <!--Pedimos el usuario y la contraseña-->
    <form action="/login" method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2" for="username">Usuario</label>
            <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" 
                   id="username" name="username" type="text" placeholder="Tu nombre de usuario" required>
        </div>
        
        <div class="mb-8">
            <label class="block text-gray-700 font-bold mb-2" for="password">Contraseña</label>
            <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" 
                   id="password" name="password" type="password" placeholder="••••••••" required>
        </div>
        <!--Botón de inicio de sesión-->
        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow transition" type="submit">
            Iniciar Sesión
        </button>
    </form>
    <!--Mensaje de no tienes cuenta que te redirige a la pantalla de registro-->
    <p class="text-center text-gray-500 mt-6 text-sm">
        ¿No tienes cuenta? <a href="/registro" class="text-blue-600 hover:underline font-bold">Regístrate gratis</a>.
    </p>
</div>
{% endblock %}
