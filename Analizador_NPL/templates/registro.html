{% extends 'base.html' %}
<!--Nuevamente, usamos base.html como base de la página-->
{% block content %}
<!--Tarjeta central para realizar el registro-->
<div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-200">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-blue-900">Crear Cuenta</h2>
        <p class="text-gray-500 text-sm mt-2">Regístrate para acceder al motor NLP</p>
    </div>

    <form action="/registro" method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2" for="username">Usuario</label>
            <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" 
                   id="username" name="username" type="text" placeholder="Ej: Fernando_Admin" required>
        </div>
        
        <div class="mb-8">
            <label class="block text-gray-700 font-bold mb-2" for="password">Contraseña</label>
            <input class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" 
                   id="password" name="password" type="password" placeholder="••••••••" required>
        </div>
        <!--Botón submit para registrarse-->
        <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow transition" type="submit">
            Registrarse
        </button>
    </form>
    <!--Enlace a la página de logeo-->
    <p class="text-center text-gray-500 mt-6 text-sm">
        ¿Ya tienes cuenta? <a href="/login" class="text-blue-600 hover:underline font-bold">Inicia sesión aquí</a>.
    </p>
</div>
{% endblock %}
